<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Состав команды</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Set window.API_BASE before this file to override, or use ?api= query param -->
<script>
  // Если Mini App открыта с того же домена что и API — используем текущий origin
  window.API_BASE_DEFAULT = window.location.origin;
</script>
<style>
  :root {
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --accent: #0f3460;
    --green: #2d6a4f;
    --green-light: #52b788;
    --gold: #f4a261;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --slot-empty: rgba(255,255,255,0.08);
    --slot-filled: rgba(82,183,136,0.2);
    --slot-border: rgba(82,183,136,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Header ─── */
  .header {
    padding: 12px 16px;
    background: var(--card-bg);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 17px; font-weight: 700; flex: 1; }
  .save-btn {
    background: var(--green-light);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-btn:active { opacity: 0.7; }

  /* ─── Formation picker ─── */
  .formation-row {
    display: flex;
    align-items: center;
    padding: 8px 16px 4px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .formation-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--green-light);
    background: rgba(82,183,136,0.1);
    color: var(--green-light);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  /* Formation modal */
  .formation-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .formation-modal-overlay.open { display: flex; }
  .formation-modal {
    background: #1a2332;
    border-radius: 16px;
    padding: 20px;
    width: 280px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .formation-modal h3 {
    margin: 0 0 14px;
    font-size: 15px;
    color: var(--text-muted);
    text-align: center;
  }
  .formation-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .f-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .f-tab.active {
    border-color: var(--green-light);
    color: var(--green-light);
    background: rgba(82,183,136,0.1);
  }
  /* Chemistry overlay — абсолютно поверх поля */
  .pitch-links-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    overflow: visible;
    width: 100%;
    height: 100%;
    display: block;
  }
  .chem-link {
    position: absolute;
    left: 0;
    top: 0;
    transform-origin: 0 50%;
    border-radius: 999px;
    pointer-events: none;
  }
  .chem-link.glow {
    opacity: 0.3;
    filter: blur(1px);
  }

  /* ─── Pitch ─── */
  .pitch-container {
    padding: 0 8px 12px;
    position: relative;
  }
  .pitch {
    background: linear-gradient(180deg, #1b4332 0%, #2d6a4f 50%, #1b4332 100%);
    border-radius: 12px;
    position: relative;
    padding: 18px 8px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    gap: 10px;
    height: clamp(360px, 52vh, 520px);
    overflow: hidden;
  }
  .pitch.compact {
    padding: 12px 8px;
    gap: 4px;
    height: clamp(420px, 62vh, 620px);
  }
  .pitch::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 2px solid rgba(255,255,255,0.22);
    border-radius: 8px;
    pointer-events: none;
    z-index: 0;
  }
  .pitch::after {
    content: '';
    position: absolute;
    inset: 12px;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.28) 0 3px, transparent 4px),
      linear-gradient(
        to bottom,
        transparent calc(50% - 1px),
        rgba(255,255,255,0.24) calc(50% - 1px),
        rgba(255,255,255,0.24) calc(50% + 1px),
        transparent calc(50% + 1px)
      ),
      radial-gradient(circle at 50% 50%, transparent 0 12%, rgba(255,255,255,0.24) 12.4% 13%, transparent 13.4%);
    background-repeat: no-repeat;
    background-size:
      6px 6px,
      100% 100%,
      100% 100%;
    background-position:
      center,
      center,
      center;
  }

  .pitch-row {
    display: flex;
    justify-content: space-evenly;
    align-items: flex-start;
    width: min(100%, var(--row-width, 100%));
    margin: 0 auto;
    gap: 10px;
  }

  /* ─── Slot ─── */
  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    width: 68px;
    position: relative;
    z-index: 5;
  }
  .pitch.compact .slot {
    width: 60px;
  }
  .pitch.compact .slot-name {
    max-width: 58px;
  }
  .slot-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--slot-empty);
    border: 2px dashed rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    overflow: visible;
    transition: all 0.2s;
    position: relative;
  }
  .slot.filled .slot-avatar {
    background: var(--slot-filled);
    border: 2px solid var(--slot-border);
  }
  .slot.filled .slot-avatar.tier-gold {
    border: 3px solid #f4a261;
    background: rgba(244,162,97,0.3);
  }
  .slot.filled .slot-avatar.tier-elite {
    border: 3px solid #a78bfa;
    background: rgba(167,139,250,0.3);
  }
  .slot.filled .slot-avatar.tier-legend {
    border: 3px solid #ef4444;
    background: rgba(239,68,68,0.25);
    box-shadow: 0 0 14px rgba(239,68,68,0.7);
  }
  .slot.selected .slot-avatar {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(244,162,97,0.4);
  }
  .slot-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .slot-avatar .slot-icon {
    color: rgba(255,255,255,0.3);
    font-size: 20px;
  }
  .slot-rating {
    position: absolute;
    bottom: -2px;
    right: -2px;
    z-index: 10;
    background: rgba(15,20,30,0.9);
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
    padding: 1px 4px;
    color: var(--gold);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .slot-penalty {
    position: absolute;
    top: -2px;
    left: -2px;
    z-index: 10;
    background: #c0392b;
    border-radius: 6px;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 3px;
    color: #fff;
  }
  .slot-label {
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    margin-top: 3px;
    text-align: center;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .slot-name {
    font-size: 9px;
    color: #fff;
    margin-top: 1px;
    text-align: center;
    max-width: 66px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  }

  /* ─── Player list ─── */
  .section-title {
    padding: 12px 16px 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    padding: 0 16px 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .pos-filter {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pos-filter.active {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
    color: var(--text);
  }

  .player-list {
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .player-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card-bg);
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }
  .player-card.selected {
    border-color: var(--gold);
    background: rgba(244,162,97,0.08);
  }
  .player-card.in-squad {
    opacity: 0.5;
  }
  .player-card:active { opacity: 0.7; }

  .player-photo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--accent);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-muted);
    overflow: hidden;
  }
  .player-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .player-rating {
    font-size: 16px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .rating-gold { color: var(--gold); }
  .rating-silver { color: #c0c0c0; }
  .rating-bronze { color: #cd7f32; }

  /* ─── Hint banner ─── */
  .hint {
    margin: 0 16px 10px;
    padding: 10px 12px;
    background: rgba(244,162,97,0.12);
    border: 1px solid rgba(244,162,97,0.3);
    border-radius: 8px;
    font-size: 12px;
    color: var(--gold);
    text-align: center;
    display: none;
  }
  .hint.visible { display: block; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e293b;
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Tab nav ─── */
  .tab-nav {
    display: flex;
    background: var(--card-bg);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: sticky;
    top: 53px;
    z-index: 99;
  }
  .tab-nav button {
    flex: 1;
    padding: 10px 4px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-nav button.active {
    color: var(--green-light);
    border-bottom-color: var(--green-light);
  }

  /* ─── Transfer market ─── */
  .market-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 12px;
    margin: 0 12px 8px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .market-card .mc-info { flex: 1; min-width: 0; }
  .market-card .mc-owner { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .market-card .mc-name { font-size: 14px; font-weight: 700; }
  .market-card .mc-meta { font-size: 12px; color: var(--text-muted); }
  .market-card .mc-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .mc-btn {
    border: none; border-radius: 8px; padding: 6px 12px;
    font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .mc-btn.green { background: var(--green-light); color: #0d1117; }
  .mc-btn.red { background: #ef4444; color: white; }
  .mc-btn.gray { background: rgba(255,255,255,0.08); color: var(--text-muted); }
  .offer-badge {
    background: var(--gold);
    color: #0d1117;
    border-radius: 10px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
  }

  /* ─── Loading ─── */
  .loading {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px;
    color: var(--text-muted);
    font-size: 14px;
    gap: 8px;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--green-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1 id="pageTitle">⚽ Состав</h1>
  <button class="save-btn" style="background:transparent;color:var(--text-muted);font-size:20px;padding:4px 10px;" onclick="reloadAll()" title="Обновить">🔄</button>
  <button class="save-btn" id="saveBtn" onclick="saveSquad()">Сохранить</button>
</div>

<!-- Tab nav -->
<div class="tab-nav">
  <button id="tab-squad" class="active" onclick="switchTab('squad')">⚽ Состав</button>
  <button id="tab-transfers" onclick="switchTab('transfers')">🔄 Трансферы</button>
  <button id="tab-opponent" onclick="switchTab('opponent')">👥 Соперник</button>
</div>

<!-- Formation modal -->
<div class="formation-modal-overlay" id="formationModalOverlay" onclick="if(event.target===this)closeFormationModal()">
  <div class="formation-modal">
    <h3>Выбери тактику</h3>
    <div class="formation-grid" id="formationGrid"></div>
  </div>
</div>

<!-- ── SQUAD TAB ── -->
<div id="page-squad">
  <!-- Formation picker -->
  <div class="formation-row">
    <button class="formation-btn" id="formationPickerBtn" onclick="openFormationModal()">4-4-2 ▾</button>
    <span id="chemDisplay" style="font-size:13px;font-weight:700;background:rgba(0,0,0,0.4);padding:2px 8px;border-radius:8px;"></span>
    <span id="avgRating" style="font-size:13px;color:var(--gold);font-weight:700;background:rgba(0,0,0,0.4);padding:2px 8px;border-radius:8px;"></span>
  </div>

  <!-- Pitch -->
  <div class="pitch-container">
    <div class="pitch" id="pitch">
      <div class="loading"><div class="spinner"></div> Загрузка...</div>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint" id="hint">Выбери слот на поле, затем выбери игрока из списка</div>

  <!-- Player list -->
  <div class="section-title">Коллекция</div>
  <div class="filter-row" id="filterRow"></div>
  <div class="player-list" id="playerList">
    <div class="loading"><div class="spinner"></div> Загрузка карточек...</div>
  </div>
</div>

<!-- ── TRANSFERS TAB ── -->
<div id="page-transfers" style="display:none; padding-bottom: 40px;">
  <!-- Мои офферы входящие -->
  <div class="section-title" id="incomingTitle" style="display:none">📨 Предложения мне</div>
  <div id="incomingOffers"></div>

  <!-- Рынок -->
  <div class="section-title">🏪 Трансферный рынок</div>
  <div id="marketList"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- ── OPPONENT TAB ── -->
<div id="page-opponent" style="display:none; padding-bottom: 40px;">
  <div style="padding: 12px 16px;">
    <div class="section-title" style="margin-bottom:8px">👥 Состав соперника</div>
    <div id="opponentSelect" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px"></div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:4px;"><span id="oppAvgRating" style="font-size:13px;color:var(--gold);font-weight:700;background:rgba(0,0,0,0.4);padding:2px 8px;border-radius:8px;"></span></div>
    <div id="opponentPitch"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
// API base: use ?api= param, or window.API_BASE override, or default
const API_BASE = new URLSearchParams(location.search).get('api')
  || window.API_BASE
  || window.API_BASE_DEFAULT
  || '';

const FORMATIONS = {
  '4-4-2': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['LM', 'CM1', 'CM2', 'RM'],
    ['ST1', 'ST2'],
  ],
  '4-3-3': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CM1', 'CM2', 'CM3'],
    ['LW', 'ST', 'RW'],
  ],
  '3-5-2': [
    ['GK'],
    ['CB1', 'CB2', 'CB3'],
    ['LM', 'CDM1', 'CAM', 'CDM2', 'RM'],
    ['ST1', 'ST2'],
  ],
  '5-3-2': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'CB3', 'RB'],
    ['CM1', 'CM2', 'CM3'],
    ['ST1', 'ST2'],
  ],
  '4-2-3-1': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CDM1', 'CDM2'],
    ['LM', 'CAM', 'RM'],
    ['ST'],
  ],
  '4-1-4-1': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CDM'],
    ['LM', 'CM1', 'CM2', 'RM'],
    ['ST'],
  ],
  '4-5-1': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['LM', 'CM1', 'CM2', 'CM3', 'RM'],
    ['ST'],
  ],
  '3-4-3': [
    ['GK'],
    ['CB1', 'CB2', 'CB3'],
    ['LM', 'CM1', 'CM2', 'RM'],
    ['LW', 'ST', 'RW'],
  ],
  '4-3-3 (4)': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CM1', 'CM2', 'CAM'],
    ['LW', 'ST', 'RW'],
  ],
  '4-1-2-1-2': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CDM'],
    ['CM1', 'CM2'],
    ['CAM'],
    ['ST1', 'ST2'],
  ],
  '4-2-2-2': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CDM1', 'CDM2'],
    ['CAM1', 'CAM2'],
    ['ST1', 'ST2'],
  ],
  '4-2-1-3': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CDM1', 'CDM2'],
    ['CAM'],
    ['LW', 'ST', 'RW'],
  ],
  '4-2-4': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CM1', 'CM2'],
    ['LW', 'ST1', 'ST2', 'RW'],
  ],
  '4-3-2-1': [
    ['GK'],
    ['LB', 'CB1', 'CB2', 'RB'],
    ['CM1', 'CM2', 'CM3'],
    ['CAM1', 'CAM2'],
    ['ST'],
  ],
};

// Which slot names map to which position group
const SLOT_POSITION = {
  GK: 'GK',
  LB: 'LB', RB: 'RB',
  CB1: 'CB', CB2: 'CB', CB3: 'CB',
  CDM: 'CDM', CDM1: 'CDM', CDM2: 'CDM',
  LM: 'LM', RM: 'RM',
  CM: 'CM', CM1: 'CM', CM2: 'CM', CM3: 'CM',
  CAM: 'CAM', CAM1: 'CAM', CAM2: 'CAM',
  LW: 'LW', RW: 'RW',
  ST: 'ST', ST1: 'ST', ST2: 'ST', ST3: 'ST',
};

// Зоны позиций (как в simulation.py)
const POSITION_ZONES = {
  GK: 0,
  CB: 1, LB: 1, RB: 1,
  CDM: 2, CM: 2, LM: 2, RM: 2,
  CAM: 3, LW: 3, RW: 3,
  CF: 4, ST: 4,
};

function computePenalty(card, slotName) {
  const slotPos = SLOT_POSITION[slotName];
  if (!slotPos || !card) return 0;
  const playerPositions = card.positions || [card.position];

  // Своя позиция
  if (playerPositions.includes(slotPos)) return 0;

  // Вратарь/не вратарь
  const isPlayerGK = playerPositions.includes('GK');
  const isSlotGK = slotPos === 'GK';
  if (isPlayerGK !== isSlotGK) return -30;

  // Зоны
  const playerZone = Math.max(...playerPositions.map(p => POSITION_ZONES[p] ?? 2));
  const slotZone = POSITION_ZONES[slotPos] ?? 2;
  if (Math.abs(playerZone - slotZone) <= 1) return -5;
  return -10;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  if (tg) {
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();
    const u = tg.initDataUnsafe?.user;
    if (u) userId = u.id;
  }

  // Fallback for testing outside Telegram
  if (!userId) {
    userId = new URLSearchParams(location.search).get('uid') || 123456;
  }

  renderFormationTabs();
  await Promise.all([loadCards(), loadSquad(), loadLastPack()]);
  renderFormationTabs();
  // Матчим player_id пака с card_id коллекции
  if (window._lastPackPlayerIds) {
    lastPackIds = new Set(cards.filter(c => window._lastPackPlayerIds.has(c.player_id)).map(c => c.id));
  }
  renderPitch();
  renderPlayerList();
  renderFilterRow();

async function reloadData() {
  await Promise.all([loadCards(), loadSquad()]);
  renderFormationTabs();
  renderPitch();
  renderPlayerList();
}

async function loadCards() {
  try {
    const r = await fetch(`${API_BASE}/api/cards?user_id=${userId}`, { cache: 'no-store' });
    cards = await r.json();
    if (!Array.isArray(cards)) cards = [];
    // Sort by rating desc
    cards.sort((a, b) => b.rating - a.rating);
    _dupNumbers = null; // сбрасываем кэш дублей
  } catch(e) {
    showToast('❌ Ошибка загрузки карточек');
  }
}

async function loadLastPack() {
  try {
    const r = await fetch(`${API_BASE}/api/lastpack?user_id=${userId}`, { cache: 'no-store' });
    const players = await r.json();
    if (!Array.isArray(players) || players.length === 0) return;
    // Сохраняем player_id из пака, матчим с карточками коллекции по player_id
    const packPlayerIds = new Set(players.map(p => p.id));
    // Будем матчить после загрузки карточек — используем player_id
    window._lastPackPlayerIds = packPlayerIds;
  } catch(e) {
    // Тихо
  }
}

async function loadSquad() {
  try {
    const r = await fetch(`${API_BASE}/api/squad?user_id=${userId}`, { cache: 'no-store' });
    const data = await r.json();
    formation = data.formation || '4-4-2';
    squad = {};
    for (const [slot, cardId] of Object.entries(data.slots || {})) {
      squad[slot] = Number(cardId);
    }
    renderFormationTabs();
  } catch(e) {
    // ignore, start fresh
  }
}

async function saveSquad() {
  const allSlots = FORMATIONS[formation].flat();
  const emptySlots = allSlots.filter(slot => !squad[slot]);
  if (emptySlots.length > 0) {
    showToast(`⚠️ Не заполнено слотов: ${emptySlots.length} (${emptySlots.join(', ')})`, 3500);
  }

  // Проверка дублей — один и тот же игрок (player_id) не может стоять дважды
  const playerIdCount = {};
  for (const [slot, cardId] of Object.entries(squad)) {
    const card = cards.find(c => c.id === cardId);
    if (!card) continue;
    const pid = card.player_id;
    if (playerIdCount[pid]) {
      showToast(`❌ ${card.name} стоит на двух позициях — убери дубль`, 4000);
      return;
    }
    playerIdCount[pid] = true;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '...';

  const body = {
    user_id: userId,
    formation: formation,
    slots: squad,
  };

  if (tg?.initData) {
    body.initData = tg.initData;
  }

  try {
    const r = await fetch(`${API_BASE}/api/squad`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (data.ok) {
      showToast('✅ Состав сохранён!');
      setTimeout(() => tg?.close(), 1500);
    } else {
      showToast('❌ ' + (data.error || 'Ошибка'));
    }
  } catch(e) {
    showToast('❌ Нет соединения');
  }

  btn.disabled = false;
  btn.textContent = 'Сохранить';
}

function getSlotNeighbors(form) {
  const edges = FORMATION_EDGES[form];
  if (!edges) return {};
  const neighbors = {};
  for (const [a, b] of edges) {
    if (!neighbors[a]) neighbors[a] = new Set();
    if (!neighbors[b]) neighbors[b] = new Set();
    neighbors[a].add(b);
    neighbors[b].add(a);
  }
  return neighbors;
}

function linkStrength(cardA, cardB) {
  if (!cardA || !cardB) return 0;
  if (cardA.club && cardB.club && cardA.club === cardB.club) return 5;
  const sameNation = cardA.nationality && cardB.nationality && cardA.nationality === cardB.nationality;
  const sameLeague = cardA.league_name && cardB.league_name && cardA.league_name === cardB.league_name;
  if (sameNation && sameLeague) return 5;
  if (sameNation || sameLeague) return 2.5;
  return 0;
}

function computeChemistry() {
  const allSlots = FORMATIONS[formation].flat();
  const neighbors = getSlotNeighbors(formation);
  let total = 0;
  for (const slot of allSlots) {
    const cardId = squad[slot];
    const card = cardId ? cards.find(c => c.id === cardId) : null;
    if (!card) continue;
    const nbSlots = [...(neighbors[slot] || [])].filter(nb => squad[nb] && cards.find(c => c.id === squad[nb]));
    let raw = 0;
    for (const nb of nbSlots) {
      const nbCard = cards.find(c => c.id === squad[nb]);
      raw += linkStrength(card, nbCard);
    }
    total += Math.min(10, raw);
  }
  return Math.round(total / 110 * 100);
}

function updateChemDisplay() {
  const chem = computeChemistry();
  const el = document.getElementById('chemDisplay');
  if (!el) return;
  if (chem === 0) { el.textContent = ''; return; }
  const color = chem >= 75 ? '#52b788' : chem >= 50 ? '#f0c040' : '#e74c3c';
  el.style.color = color;
  el.textContent = `⚗️ ${chem}`;
}

function drawChemLinks() {
  const pitchEl = document.getElementById('pitch');
  if (!pitchEl) return;
  const overlay = document.getElementById('chemLinks');
  if (!overlay) return;
  overlay.innerHTML = '';

  const pitchRect = pitchEl.getBoundingClientRect();
  const neighbors = getSlotNeighbors(formation);
  const allSlots = FORMATIONS[formation].flat();

  // Центры аватарок относительно pitch
  const slotCenters = {};
  for (const slot of allSlots) {
    const slotEl = pitchEl.querySelector(`[data-slot="${slot}"]`);
    if (!slotEl) continue;
    const avatarEl = slotEl.querySelector('.slot-avatar') || slotEl;
    const r = avatarEl.getBoundingClientRect();
    slotCenters[slot] = {
      x: r.left + r.width / 2 - pitchRect.left,
      y: r.top + r.height / 2 - pitchRect.top,
    };
  }

  const drawn = new Set();
  for (const slot of allSlots) {
    for (const nb of (neighbors[slot] || [])) {
      const key = [slot, nb].sort().join('|');
      if (drawn.has(key)) continue;
      drawn.add(key);
      const p1 = slotCenters[slot];
      const p2 = slotCenters[nb];
      if (!p1 || !p2) continue;

      const cardA = squad[slot] ? cards.find(c => c.id === squad[slot]) : null;
      const cardB = squad[nb] ? cards.find(c => c.id === squad[nb]) : null;
      const isEmptyLink = !cardA || !cardB;
      const str = isEmptyLink ? 0 : linkStrength(cardA, cardB);

      let stroke;
      if (isEmptyLink) stroke = 'rgba(255,255,255,0.26)';
      else if (str >= 5) stroke = '#6ee7b7';
      else if (str >= 2.5) stroke = '#ffd166';
      else stroke = 'rgba(255,255,255,0.55)';

      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const length = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx) * (180 / Math.PI);

      if (!isEmptyLink) {
        const glow = document.createElement('div');
        glow.className = 'chem-link glow';
        glow.style.left = `${p1.x}px`;
        glow.style.top = `${p1.y}px`;
        glow.style.width = `${length}px`;
        glow.style.height = `${str >= 5 ? 5 : str >= 2.5 ? 4 : 3}px`;
        glow.style.background = stroke;
        glow.style.transform = `translateY(-50%) rotate(${angle}deg)`;
        overlay.appendChild(glow);
      }

      const line = document.createElement('div');
      line.className = 'chem-link';
      line.style.left = `${p1.x}px`;
      line.style.top = `${p1.y}px`;
      line.style.width = `${length}px`;
      line.style.height = `${isEmptyLink ? 2 : str >= 5 ? 2.5 : str >= 2.5 ? 2 : 1.5}px`;
      line.style.background = isEmptyLink
        ? `repeating-linear-gradient(to right, ${stroke} 0 7px, transparent 7px 13px)`
        : stroke;
      line.style.opacity = isEmptyLink ? '0.8' : '0.95';
      line.style.transform = `translateY(-50%) rotate(${angle}deg)`;
      overlay.appendChild(line);
    }
  }
}

// ─── Pitch ────────────────────────────────────────────────────────────────────
function renderPitch() {
  const pitch = document.getElementById('pitch');
  const rows = [...(FORMATIONS[formation] || [])].reverse(); // вратарь снизу
  pitch.innerHTML = '';
  pitch.classList.toggle('compact', rows.length >= 5);

  const overlay = document.createElement('div');
  overlay.id = 'chemLinks';
  overlay.className = 'pitch-links-overlay';
  pitch.appendChild(overlay);

  for (const row of rows) {
    const rowEl = document.createElement('div');
    rowEl.className = 'pitch-row';
    const rowWidths = { 1: '34%', 2: '58%', 3: '74%', 4: '90%', 5: '100%' };
    rowEl.style.setProperty('--row-width', rowWidths[row.length] || '100%');
    for (const slotName of row) {
      rowEl.appendChild(makeSlotEl(slotName));
    }
    pitch.appendChild(rowEl);
  }

  updateAvgRating();
  requestAnimationFrame(() => requestAnimationFrame(drawChemLinks));
}

function updateAvgRating() {
  const allSlots = FORMATIONS[formation].flat();
  const ratings = allSlots
    .map(slot => {
      const cardId = squad[slot];
      const card = cardId ? cards.find(c => c.id === cardId) : null;
      if (!card) return null;
      return card.rating + computePenalty(card, slot);
    })
    .filter(r => r !== null);
  const el = document.getElementById('avgRating');
  if (ratings.length === 0) { el.textContent = ''; return; }
  const avg = (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1);
  el.textContent = `★ ${avg}`;
  updateChemDisplay();
}

function makeSlotEl(slotName) {
  const cardId = squad[slotName];
  const card = cardId ? cards.find(c => c.id === cardId) : null;

  const el = document.createElement('div');
  el.className = 'slot' + (card ? ' filled' : '') + (selectedSlot === slotName ? ' selected' : '');
  el.dataset.slot = slotName;
  el.onclick = () => selectSlot(slotName);

  const avatar = document.createElement('div');
  avatar.className = 'slot-avatar';

  // Внутренний круг для фото (с clip)
  const photoWrap = document.createElement('div');
  photoWrap.style.cssText = 'width:100%;height:100%;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;';

  if (card) {
    if (card.rating >= 90) avatar.classList.add('tier-legend');
    else if (card.rating >= 85) avatar.classList.add('tier-elite');
    else if (card.rating >= 80) avatar.classList.add('tier-gold');
    if (card.photo) {
      const img = document.createElement('img');
      img.src = photoUrl(card.photo);
      const isTransfermarkt = card.photo && card.photo.includes('transfermarkt');
      img.style.cssText = 'width:100%;height:100%;border-radius:50%;' + (isTransfermarkt ? 'object-fit:contain;object-position:center;' : 'object-fit:cover;');
      img.onerror = () => { photoWrap.textContent = '👤'; };
      photoWrap.appendChild(img);
    } else {
      photoWrap.textContent = '👤';
    }
    avatar.appendChild(photoWrap);
    // Рейтинг поверх, z-index выше
    const penalty = computePenalty(card, slotName);
    const ratingEl = document.createElement('div');
    ratingEl.className = 'slot-rating';
    ratingEl.textContent = card.rating + penalty;
    ratingEl.style.color = penalty < 0 ? '#e74c3c' : 'var(--gold)';
    avatar.appendChild(ratingEl);
    // Штраф бейдж
    if (penalty < 0) {
      const penaltyEl = document.createElement('div');
      penaltyEl.className = 'slot-penalty';
      penaltyEl.textContent = penalty;
      avatar.appendChild(penaltyEl);
    }
  } else {
    const icon = document.createElement('span');
    icon.className = 'slot-icon';
    icon.textContent = slotName === 'GK' ? '🧤' : '+';
    photoWrap.appendChild(icon);
    avatar.appendChild(photoWrap);
  }

  const label = document.createElement('div');
  label.className = 'slot-label';
  label.textContent = slotName.replace(/\d/, '');

  const nameEl = document.createElement('div');
  nameEl.className = 'slot-name';
  nameEl.textContent = card ? shortName(card.name) : '';

  el.appendChild(avatar);
  el.appendChild(label);
  el.appendChild(nameEl);
  return el;
}

function photoUrl(url) {
  if (!url) return null;
  return `${API_BASE}/api/photo?url=${encodeURIComponent(url)}`;
}

function shortName(name) {
  const parts = name.split(' ');
  if (parts.length === 1) return name;
  return parts[parts.length - 1]; // last name
}

  'Venezuela': '🇻🇪', 'Peru': '🇵🇪', 'Iran': '🇮🇷', 'Saudi Arabia': '🇸🇦',
  'Algeria': '🇩🇿', 'Tunisia': '🇹🇳', 'Ivory Coast': '🇨🇮', 'Mali': '🇲🇱',
};
function nationalityFlag(nationality) {
  return NATIONALITY_FLAGS[nationality] || '';
}

function selectSlot(slotName) {
  // Если уже выбрана карточка — назначаем её на этот слот
  if (selectedCard) {
    _assignCardToSlot(selectedCard, slotName);
    selectedCard = null;
    selectedSlot = null;
    setHint(false);
    renderPitch();
    renderPlayerList();
    return;
  }

  if (selectedSlot === slotName) {
    // Повторный клик на тот же слот — снимаем игрока
    delete squad[slotName];
    selectedSlot = null;
    setHint(false);
    posFilter = 'ALL';
  } else {
    selectedSlot = slotName;
    selectedCard = null;
    setHint(true);
    // Автофильтр по позиции слота
    const slotPos = SLOT_POSITION[slotName];
    posFilter = slotPos || 'ALL';
  }
  visibleCount = pageSize;
  renderPitch();
  renderFilterRow();
  renderPlayerList();
}

// ─── Player list ──────────────────────────────────────────────────────────────
const POSITIONS = ['ALL', 'GK', 'CB', 'LB', 'RB', 'CDM', 'CM', 'LM', 'RM', 'CAM', 'LW', 'RW', 'CF', 'ST'];

function renderFilterRow() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  // Кнопка последнего пака (если есть)
  if (lastPackIds.size > 0) {
    const btn = document.createElement('button');
    btn.className = 'pos-filter' + (posFilter === 'PACK' ? ' active' : '');
    btn.textContent = '🎴 Пак';
    btn.onclick = () => { posFilter = 'PACK'; visibleCount = pageSize; renderFilterRow(); renderPlayerList(); };
    row.appendChild(btn);
  }
  for (const pos of POSITIONS) {
    const btn = document.createElement('button');
    btn.className = 'pos-filter' + (pos === posFilter ? ' active' : '');
    btn.textContent = pos;
    btn.onclick = () => { posFilter = pos; visibleCount = pageSize; renderFilterRow(); renderPlayerList(); };
    row.appendChild(btn);
  }
}

function renderPlayerList() {
  const list = document.getElementById('playerList');
  list.innerHTML = '';

  const assignedCardIds = new Set(Object.values(squad));
  let filtered = cards;

  if (posFilter === 'PACK') {
    filtered = cards.filter(c => lastPackIds.has(c.id));
  } else if (posFilter !== 'ALL') {
    filtered = cards.filter(c => c.position === posFilter || (c.positions || []).includes(posFilter));
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#64748b;padding:20px;font-size:13px;">Нет карточек</div>';
    return;
  }

  const visible = filtered.slice(0, visibleCount);
  for (const card of visible) {
    const inSquad = assignedCardIds.has(card.id) && squad[selectedSlot] !== card.id;
    const isSelected = (selectedSlot && squad[selectedSlot] === card.id) || (selectedCard && selectedCard.id === card.id);
    list.appendChild(makeCardEl(card, inSquad, isSelected));
  }

  if (visibleCount < filtered.length) {
    const btn = document.createElement('button');
    btn.textContent = `Ещё ${Math.min(pageSize, filtered.length - visibleCount)} из ${filtered.length}`;
    btn.style.cssText = 'width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;';
    btn.onclick = () => { visibleCount += pageSize; renderPlayerList(); };
    list.appendChild(btn);
  }
}

// Предвычисляем порядковые номера дублей: {card.id -> номер (1-based, 1 = оригинал)}
function computeDuplicateNumbers() {
  const groups = {};
  for (const c of cards) {
    if (!groups[c.player_id]) groups[c.player_id] = [];
    groups[c.player_id].push(c);
  }
  const result = {};
  for (const group of Object.values(groups)) {
    group.sort((a, b) => a.id - b.id); // старше = меньший id
    group.forEach((c, i) => { result[c.id] = i + 1; });
  }
  return result;
}
let _dupNumbers = null;
function getDupNumber(cardId) {
  if (!_dupNumbers) _dupNumbers = computeDuplicateNumbers();
  return _dupNumbers[cardId] || 1;
}

function cardMetaText(card) {
  const parts = [card.position, card.club, card.league_name].filter(Boolean);
  return parts.join(' · ');
}

function makeCardEl(card, inSquad, isSelected) {
  const el = document.createElement('div');
  el.className = 'player-card' + (inSquad ? ' in-squad' : '') + (isSelected ? ' selected' : '');
  el.onclick = () => assignCard(card);

  // Photo
  const photoEl = document.createElement('div');
  photoEl.className = 'player-photo';
  if (card.photo) {
    const img = document.createElement('img');
    img.src = photoUrl(card.photo);
    img.onerror = () => { img.parentElement.textContent = '👤'; };
    photoEl.appendChild(img);
  } else {
    photoEl.textContent = '👤';
  }

  // Info
  const info = document.createElement('div');
  info.className = 'player-info';
  const name = document.createElement('div');
  name.className = 'player-name';
  const flag = nationalityFlag(card.nationality);
  const dupNum = getDupNumber(card.id);
  const dupSuffix = dupNum > 1 ? ` <span style="font-size:10px;color:#94a3b8;font-weight:500;">#${dupNum}</span>` : '';
  name.innerHTML = (flag ? flag + ' ' : '') + card.name + dupSuffix;
  const meta = document.createElement('div');
  meta.className = 'player-meta';
  meta.textContent = cardMetaText(card);
  info.appendChild(name);
  info.appendChild(meta);

  // Rating
  const rating = document.createElement('div');
  rating.className = 'player-rating ' + ratingClass(card.rating);
  rating.textContent = card.rating;

  el.appendChild(photoEl);
  el.appendChild(info);
  el.appendChild(rating);
  return el;
}

function ratingClass(r) {
  if (r >= 85) return 'rating-gold';
  if (r >= 75) return 'rating-silver';
  return 'rating-bronze';
}

function _assignCardToSlot(card, slotName) {
  // Block GK ↔ outfield swap
  const slotPos = SLOT_POSITION[slotName];
  const playerPositions = card.positions || [card.position];
  const isPlayerGK = playerPositions.includes('GK');
  const isSlotGK = slotPos === 'GK';
  if (isPlayerGK && !isSlotGK) {
    showToast('❌ Вратаря нельзя ставить на полевую позицию');
    return false;
  }
  if (!isPlayerGK && isSlotGK) {
    showToast('❌ Полевого нельзя ставить в ворота');
    return false;
  }
  // Убираем карточку с других слотов
  for (const [s, cid] of Object.entries(squad)) {
    if (cid === card.id) delete squad[s];
  }
  if (squad[slotName] === card.id) {
    delete squad[slotName];
  } else {
    squad[slotName] = card.id;
  }
  return true;
}

function assignCard(card) {
  if (selectedSlot) {
    // Флоу 1: слот уже выбран → назначаем карточку
    _assignCardToSlot(card, selectedSlot);
    selectedSlot = null;
    selectedCard = null;
    setHint(false);
    posFilter = 'ALL';
    renderPitch();
    renderFilterRow();
    renderPlayerList();
    return;
  }

  if (selectedCard && selectedCard.id === card.id) {
    // Повторный клик на ту же карточку — снимаем выбор
    selectedCard = null;
    setHint(false);
    renderPlayerList();
    return;
  }

  // Флоу 2: карточка выбрана первой → подсвечиваем, ждём клика по слоту
  selectedCard = card;
  selectedSlot = null;
  setHint(true);
  document.getElementById('hint').textContent = `Выбран: ${card.name} — выбери слот на поле`;
  renderPitch();
  renderPlayerList();
}

function renderOpponentPitch(data) {
  const formation = data.formation || '4-4-2';
  const rows = [...(FORMATIONS[formation] || FORMATIONS['4-4-2'])].reverse();
  // slot -> player map
  const slotMap = {};
  (data.slots || []).forEach(s => { slotMap[s.slot] = s.player; });

  // Показываем только основной состав (11 слотов из схемы)
  const mainSlots = rows.flat();

  let html = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;text-align:center">${formation}</div>`;
  html += '<div style="background:linear-gradient(180deg,#2d5a27,#1a3a15);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px;">';
  for (const row of rows) {
    html += '<div style="display:flex;justify-content:center;gap:8px;">';
    for (const slot of row) {
      const p = slotMap[slot];
      if (p) {
        const eff = p.effective_rating ?? p.rating ?? p.overall_rating;
        const pen = p.penalty ?? 0;
        const star = eff >= 90 ? '👑' : eff >= 85 ? '🌟' : '⭐';
        const ratingColor = pen < 0 ? '#e74c3c' : 'var(--gold)';
        const penStr = pen < 0 ? `<div style="font-size:9px;color:#e74c3c;font-weight:700">${pen}</div>` : '';
        const tierBorder = eff >= 90 ? '2px solid #ef4444' : eff >= 85 ? '2px solid #a78bfa' : eff >= 80 ? '2px solid #f4a261' : '2px solid transparent';
        const tierBg = eff >= 90 ? 'rgba(239,68,68,0.2)' : eff >= 85 ? 'rgba(167,139,250,0.25)' : eff >= 80 ? 'rgba(244,162,97,0.25)' : 'rgba(255,255,255,0.1)';
        const tierShadow = eff >= 90 ? 'box-shadow:0 0 10px rgba(239,68,68,0.8);' : '';
        const photo = p.photo
          ? `<img src="${API_BASE}/api/photo?url=${encodeURIComponent(p.photo)}" style="width:36px;height:36px;border-radius:50%;${p.photo.includes('transfermarkt') ? 'object-fit:contain;' : 'object-fit:cover;'}display:block;margin:0 auto 2px;border:${tierBorder};">`
          : `<div style="width:36px;height:36px;border-radius:50%;background:${tierBg};display:flex;align-items:center;justify-content:center;font-size:14px;margin:0 auto 2px;border:${tierBorder};${tierShadow}">👤</div>`;
        html += `<div style="text-align:center;min-width:52px;max-width:60px;">
          ${photo}
          <div style="font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name.split(' ').pop()}</div>
          <div style="font-size:10px;color:${ratingColor}">${eff}${star}</div>
          ${penStr}
        </div>`;
      } else {
        html += `<div style="text-align:center;min-width:52px;max-width:60px;">
          <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);margin:0 auto 2px;border:1px dashed rgba(255,255,255,0.2)"></div>
          <div style="font-size:10px;color:var(--text-muted)">${slot}</div>
        </div>`;
      }
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('opponentPitch').innerHTML = html;

  // Средний рейтинг соперника (по effective_rating с учётом штрафов)
  const oppRatings = (data.slots || []).filter(s => mainSlots.includes(s.slot)).map(s => s.player.effective_rating ?? s.player.rating ?? s.player.overall_rating);
  const oppAvg = oppRatings.length ? (oppRatings.reduce((a,b)=>a+b,0)/oppRatings.length).toFixed(1) : null;
  document.getElementById('oppAvgRating').textContent = oppAvg ? `★ ${oppAvg}` : '';
}

function createModal(title) {
  const overlay = document.createElement('div');
  overlay.id = 'modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:flex-end;';
  const sheet = document.createElement('div');
  sheet.style.cssText = 'background:#1e293b;border-radius:20px 20px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:16px;';
  const h = document.createElement('div');
  h.style.cssText = 'font-size:15px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;';
  h.innerHTML = `<span>${title}</span><button onclick="closeModal()" style="background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;">✕</button>`;
  sheet.appendChild(h);
  const body = document.createElement('div');
  sheet.appendChild(body);
  overlay.appendChild(sheet);
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  document.body.appendChild(overlay);
  return { overlay, body };
}

function closeModal() {
  const el = document.getElementById('modal-overlay');
  if (el) el.remove();
}

    showToast('✅ Карточка снята с рынка');
    loadMarket();
  } catch(e) { showToast('❌ Ошибка'); }
}

async function makeOffer(listingId, offerCardId) {
  try {
    const r = await fetch(`${API_BASE}/api/market/offer`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: userId, listing_id: listingId, offer_card_id: offerCardId }),
    });
    const data = await r.json();
    if (data.error) { showToast('❌ ' + data.error); return; }
    showToast('✅ Предложение отправлено');
    loadMarket();
  } catch(e) { showToast('❌ Ошибка'); }
}

async function acceptOffer(offerId) {
  try {
    const r = await fetch(`${API_BASE}/api/market/accept`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: userId, offer_id: offerId }),
    });
    const data = await r.json();
    if (data.error) { showToast('❌ ' + data.error); return; }
    showToast('✅ Обмен выполнен!');
    await Promise.all([loadCards(), loadMarket()]);
  } catch(e) { showToast('❌ Ошибка'); }
}

async function declineOffer(offerId) {
  try {
    const r = await fetch(`${API_BASE}/api/market/decline-offer`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: userId, offer_id: offerId }),
    });
    const data = await r.json();
    if (data.error) { showToast('❌ ' + data.error); return; }
    showToast('Предложение отклонено');
    loadMarket();
  } catch(e) { showToast('❌ Ошибка'); }
}

init();
window.addEventListener('resize', () => { drawChemLinks(); });
</script>
